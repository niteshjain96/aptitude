<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>CSAT Aptitude Prep – UPSC Prelims</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Noto+Serif:ital,wght@0,400;0,600;1,400&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
  :root {
    --saffron: #E05A00;
    --saffron-light: #F07030;
    --saffron-pale: #FFF3E8;
    --navy: #1A2D5A;
    --gold: #B07820;
    --gold-light: #C89030;
    --green: #1B6B28;
    --green-light: #2E8B3A;
    --green-bg: #EAF5EC;
    --red: #B71C1C;
    --red-light: #D32F2F;
    --red-bg: #FDECEA;
    --text: #1A1A2E;
    --text-mid: #3D4A6A;
    --grey: #6B7A99;
    --border: #DDE3EF;
    --border-gold: rgba(176,120,32,0.3);
    --bg: #F4F6FB;
    --bg2: #EDF0F8;
    --card: #FFFFFF;
    --card2: #F8F9FD;
    --shadow: rgba(26,45,90,0.08);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Rajdhani', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Subtle dot-grid background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      radial-gradient(circle at 15% 15%, rgba(224,90,0,0.04) 0%, transparent 45%),
      radial-gradient(circle at 85% 85%, rgba(176,120,32,0.04) 0%, transparent 45%),
      radial-gradient(circle, rgba(100,120,180,0.12) 1px, transparent 1px);
    background-size: auto, auto, 28px 28px;
    pointer-events: none;
    z-index: 0;
  }

  /* ===== HEADER ===== */
  .header {
    position: relative;
    z-index: 10;
    background: linear-gradient(135deg, #1A2D5A 0%, #243B72 100%);
    border-bottom: 3px solid var(--gold-light);
    padding: 0 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 68px;
    box-shadow: 0 3px 16px rgba(26,45,90,0.18);
  }

  .header-logo {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .ashok-chakra {
    width: 40px;
    height: 40px;
    border: 3px solid var(--gold-light);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
    animation: spin 20s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .header-title {
    font-family: 'Rajdhani', sans-serif;
    font-weight: 700;
    font-size: 22px;
    letter-spacing: 1px;
    background: linear-gradient(90deg, #F0C060, #FFE0A0);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .header-sub {
    font-size: 11px;
    color: rgba(255,255,255,0.5);
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-top: 2px;
  }

  .header-badge {
    background: var(--saffron);
    color: white;
    font-size: 11px;
    font-weight: 700;
    padding: 4px 12px;
    border-radius: 20px;
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  /* ===== MAIN WRAPPER ===== */
  #app {
    position: relative;
    z-index: 1;
    max-width: 1100px;
    margin: 0 auto;
    padding: 32px 20px 60px;
  }

  /* ===== HOME SCREEN ===== */
  .home-hero {
    text-align: center;
    padding: 40px 0 50px;
  }

  .home-hero h1 {
    font-size: clamp(28px, 5vw, 48px);
    font-weight: 700;
    line-height: 1.2;
    margin-bottom: 12px;
    color: var(--navy);
  }

  .home-hero h1 span {
    background: linear-gradient(90deg, var(--saffron), var(--gold-light));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .home-hero p {
    font-family: 'Noto Serif', serif;
    color: var(--grey);
    font-size: 15px;
    max-width: 520px;
    margin: 0 auto 32px;
    line-height: 1.7;
  }

  .stats-row {
    display: flex;
    justify-content: center;
    gap: 32px;
    margin-bottom: 50px;
    flex-wrap: wrap;
  }

  .stat-item { text-align: center; }

  .stat-num {
    font-family: 'JetBrains Mono', monospace;
    font-size: 28px;
    font-weight: 600;
    color: var(--saffron);
  }

  .stat-label {
    font-size: 11px;
    color: var(--grey);
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-top: 2px;
  }

  /* Chapter grid */
  .section-heading {
    font-size: 13px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 20px;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .section-heading::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  .chapter-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
    gap: 16px;
  }

  .chapter-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 22px 20px;
    cursor: pointer;
    transition: all 0.25s ease;
    position: relative;
    overflow: hidden;
    display: flex;
    align-items: flex-start;
    gap: 14px;
    box-shadow: 0 2px 8px var(--shadow);
  }

  .chapter-card::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, rgba(224,90,0,0.04), transparent);
    opacity: 0;
    transition: opacity 0.25s;
  }

  .chapter-card:hover {
    border-color: var(--saffron-light);
    transform: translateY(-3px);
    box-shadow: 0 10px 28px rgba(224,90,0,0.12);
  }

  .chapter-card:hover::before { opacity: 1; }

  .chapter-icon {
    width: 44px;
    height: 44px;
    background: linear-gradient(135deg, var(--saffron), var(--gold));
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
    flex-shrink: 0;
    box-shadow: 0 3px 10px rgba(224,90,0,0.25);
  }

  .chapter-info { flex: 1; }

  .chapter-name {
    font-weight: 700;
    font-size: 16px;
    margin-bottom: 4px;
    color: var(--text);
  }

  .chapter-meta {
    font-size: 12px;
    color: var(--grey);
    display: flex;
    gap: 8px;
  }

  .chapter-meta span {
    background: var(--bg2);
    padding: 2px 8px;
    border-radius: 4px;
  }

  .chapter-arrow {
    color: var(--saffron);
    font-size: 18px;
    align-self: center;
    opacity: 0;
    transform: translateX(-6px);
    transition: all 0.2s;
  }

  .chapter-card:hover .chapter-arrow {
    opacity: 1;
    transform: translateX(0);
  }

  /* Loading spinner */
  .loading {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
    padding: 60px;
    color: var(--grey);
  }

  .spinner {
    width: 28px;
    height: 28px;
    border: 3px solid rgba(224,90,0,0.15);
    border-top-color: var(--saffron);
    border-radius: 50%;
    animation: spin2 0.8s linear infinite;
  }

  @keyframes spin2 { to { transform: rotate(360deg); } }

  /* ===== CHAPTER SELECT SCREEN ===== */
  .breadcrumb {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 30px;
    font-size: 13px;
    color: var(--grey);
  }

  .breadcrumb a {
    color: var(--saffron);
    cursor: pointer;
    text-decoration: none;
    font-weight: 600;
  }

  .breadcrumb a:hover { text-decoration: underline; }

  .chapter-header {
    display: flex;
    align-items: flex-start;
    gap: 20px;
    margin-bottom: 36px;
    padding: 28px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    border-left: 4px solid var(--saffron);
    box-shadow: 0 2px 10px var(--shadow);
  }

  .chapter-header-icon {
    width: 56px;
    height: 56px;
    background: linear-gradient(135deg, var(--saffron), var(--gold));
    border-radius: 14px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 26px;
    flex-shrink: 0;
    box-shadow: 0 4px 12px rgba(224,90,0,0.25);
  }

  .chapter-header h2 {
    font-size: 26px;
    font-weight: 700;
    margin-bottom: 4px;
    color: var(--text);
  }

  .chapter-header p {
    font-family: 'Noto Serif', serif;
    color: var(--grey);
    font-size: 13px;
    line-height: 1.5;
  }

  .quiz-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 14px;
  }

  .quiz-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px;
    cursor: pointer;
    transition: all 0.2s;
    text-align: center;
    position: relative;
    box-shadow: 0 2px 8px var(--shadow);
  }

  .quiz-card:hover {
    border-color: var(--gold-light);
    transform: translateY(-2px);
    box-shadow: 0 8px 24px rgba(176,120,32,0.15);
  }

  .quiz-num {
    font-family: 'JetBrains Mono', monospace;
    font-size: 30px;
    font-weight: 600;
    color: var(--saffron);
    margin-bottom: 6px;
  }

  .quiz-label {
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--text);
    margin-bottom: 10px;
  }

  .quiz-range {
    font-size: 12px;
    color: var(--grey);
    font-family: 'JetBrains Mono', monospace;
  }

  .quiz-status {
    position: absolute;
    top: 10px;
    right: 10px;
    font-size: 10px;
    padding: 2px 8px;
    border-radius: 4px;
    font-weight: 700;
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  .status-done { background: #EAF5EC; color: var(--green-light); }
  .status-new { background: var(--saffron-pale); color: var(--saffron); }

  /* ===== QUIZ SCREEN ===== */
  .quiz-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 24px;
    flex-wrap: wrap;
    gap: 12px;
  }

  .quiz-title-block { flex: 1; }

  .quiz-title-block h2 {
    font-size: 20px;
    font-weight: 700;
    color: var(--text);
  }

  .quiz-title-block small {
    font-size: 12px;
    color: var(--grey);
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  .quiz-actions {
    display: flex;
    gap: 10px;
    align-items: center;
  }

  .btn {
    padding: 10px 20px;
    border-radius: 8px;
    font-family: 'Rajdhani', sans-serif;
    font-size: 14px;
    font-weight: 700;
    letter-spacing: 1px;
    text-transform: uppercase;
    cursor: pointer;
    border: none;
    transition: all 0.2s;
  }

  .btn-primary {
    background: linear-gradient(135deg, var(--saffron), var(--gold));
    color: white;
    box-shadow: 0 3px 10px rgba(224,90,0,0.25);
  }

  .btn-primary:hover {
    transform: translateY(-1px);
    box-shadow: 0 6px 18px rgba(224,90,0,0.35);
  }

  .btn-outline {
    background: white;
    border: 1.5px solid var(--border);
    color: var(--text-mid);
  }

  .btn-outline:hover {
    border-color: var(--gold-light);
    color: var(--gold);
    background: var(--saffron-pale);
  }

  .btn-danger {
    background: var(--red-bg);
    border: 1.5px solid rgba(211,47,47,0.3);
    color: var(--red-light);
  }

  .btn-danger:hover {
    background: #FBDDDD;
  }

  /* Progress bar */
  .progress-bar-wrap {
    background: var(--border);
    border-radius: 4px;
    height: 7px;
    margin-bottom: 24px;
    overflow: hidden;
  }

  .progress-bar-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--saffron), var(--gold-light));
    border-radius: 4px;
    transition: width 0.4s ease;
  }

  .progress-meta {
    display: flex;
    justify-content: space-between;
    font-size: 12px;
    color: var(--grey);
    margin-bottom: 6px;
    font-family: 'JetBrains Mono', monospace;
  }

  /* Question navigator */
  .q-navigator {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-bottom: 24px;
    padding: 16px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    box-shadow: 0 1px 6px var(--shadow);
  }

  .q-dot {
    width: 34px;
    height: 34px;
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    border: 1.5px solid var(--border);
    background: var(--bg2);
    color: var(--grey);
  }

  .q-dot:hover { border-color: var(--gold-light); color: var(--gold); background: var(--saffron-pale); }
  .q-dot.active { border-color: var(--saffron); background: var(--saffron-pale); color: var(--saffron); }
  .q-dot.answered { background: var(--green-bg); border-color: var(--green-light); color: var(--green); }
  .q-dot.answered.active { border-color: var(--saffron); background: var(--saffron-pale); color: var(--saffron); }

  /* Question card */
  .question-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 28px;
    margin-bottom: 20px;
    animation: fadeIn 0.3s ease;
    box-shadow: 0 2px 12px var(--shadow);
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .q-number {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    letter-spacing: 2px;
    color: var(--saffron);
    text-transform: uppercase;
    margin-bottom: 12px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .q-number::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  .q-text {
    font-family: 'Noto Serif', serif;
    font-size: 17px;
    line-height: 1.75;
    color: var(--text);
    margin-bottom: 24px;
  }

  .options-list { display: flex; flex-direction: column; gap: 10px; }

  .option-btn {
    background: var(--bg2);
    border: 1.5px solid var(--border);
    border-radius: 10px;
    padding: 14px 18px;
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    gap: 14px;
    text-align: left;
    color: var(--text);
    font-family: 'Rajdhani', sans-serif;
    font-size: 15px;
    font-weight: 500;
  }

  .option-btn:hover:not(.disabled) {
    background: var(--saffron-pale);
    border-color: var(--saffron-light);
    transform: translateX(3px);
  }

  .option-label {
    width: 28px;
    height: 28px;
    border-radius: 6px;
    background: white;
    border: 1.5px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    font-weight: 700;
    flex-shrink: 0;
    transition: all 0.2s;
    color: var(--text-mid);
  }

  .option-btn.selected {
    background: var(--saffron-pale);
    border-color: var(--saffron);
  }

  .option-btn.selected .option-label {
    background: var(--saffron);
    border-color: var(--saffron);
    color: white;
  }

  /* After submit */
  .option-btn.correct {
    background: var(--green-bg);
    border-color: var(--green-light);
  }

  .option-btn.correct .option-label {
    background: var(--green);
    border-color: var(--green);
    color: white;
  }

  .option-btn.wrong {
    background: var(--red-bg);
    border-color: var(--red-light);
  }

  .option-btn.wrong .option-label {
    background: var(--red);
    border-color: var(--red);
    color: white;
  }

  .option-btn.disabled { cursor: default; }

  .explanation-box {
    margin-top: 18px;
    padding: 14px 18px;
    background: #FFFBEF;
    border: 1px solid rgba(176,120,32,0.3);
    border-left: 3px solid var(--gold);
    border-radius: 8px;
    font-family: 'Noto Serif', serif;
    font-size: 14px;
    color: #5C4A1A;
    line-height: 1.7;
    display: none;
  }

  .explanation-box.show { display: block; animation: fadeIn 0.3s ease; }

  .explanation-box strong {
    color: var(--gold);
    font-family: 'Rajdhani', sans-serif;
    letter-spacing: 1px;
    font-size: 11px;
    text-transform: uppercase;
    display: block;
    margin-bottom: 4px;
  }

  /* Nav buttons */
  .nav-row {
    display: flex;
    justify-content: space-between;
    gap: 12px;
    margin-bottom: 24px;
  }

  /* ===== RESULT SCREEN ===== */
  .result-screen {
    text-align: center;
    padding: 40px 20px;
    animation: fadeIn 0.5s ease;
  }

  .result-score-ring {
    width: 160px;
    height: 160px;
    margin: 0 auto 30px;
    position: relative;
  }

  .result-score-ring svg { transform: rotate(-90deg); }

  .score-text-center {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }

  .score-big {
    font-family: 'JetBrains Mono', monospace;
    font-size: 36px;
    font-weight: 700;
    color: var(--saffron);
  }

  .score-denom {
    font-size: 13px;
    color: var(--grey);
    font-family: 'JetBrains Mono', monospace;
  }

  .result-title {
    font-size: 28px;
    font-weight: 700;
    margin-bottom: 8px;
    color: var(--text);
  }

  .result-subtitle {
    font-family: 'Noto Serif', serif;
    color: var(--grey);
    font-size: 14px;
    margin-bottom: 36px;
  }

  .result-stats {
    display: flex;
    justify-content: center;
    gap: 24px;
    margin-bottom: 36px;
    flex-wrap: wrap;
  }

  .result-stat {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px 24px;
    min-width: 100px;
    box-shadow: 0 2px 8px var(--shadow);
  }

  .result-stat-num {
    font-family: 'JetBrains Mono', monospace;
    font-size: 26px;
    font-weight: 700;
    margin-bottom: 4px;
  }

  .result-stat-label { font-size: 12px; color: var(--grey); letter-spacing: 1px; text-transform: uppercase; }
  .correct-color { color: var(--green-light); }
  .wrong-color { color: var(--red-light); }
  .skip-color { color: #D4890A; }

  /* ===== MODAL ===== */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(26,45,90,0.45);
    backdrop-filter: blur(4px);
    z-index: 1000;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
    animation: fadeIn 0.2s ease;
  }

  .modal {
    background: white;
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 32px;
    max-width: 420px;
    width: 100%;
    border-top: 3px solid var(--saffron);
    box-shadow: 0 16px 48px rgba(26,45,90,0.2);
  }

  .modal h3 {
    font-size: 22px;
    font-weight: 700;
    margin-bottom: 10px;
    color: var(--text);
  }

  .modal p {
    font-family: 'Noto Serif', serif;
    color: var(--grey);
    font-size: 14px;
    line-height: 1.7;
    margin-bottom: 24px;
  }

  .modal-stats {
    display: flex;
    gap: 16px;
    margin-bottom: 24px;
    flex-wrap: wrap;
  }

  .modal-stat {
    flex: 1;
    min-width: 80px;
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px;
    text-align: center;
  }

  .modal-stat-num {
    font-family: 'JetBrains Mono', monospace;
    font-size: 22px;
    font-weight: 700;
    margin-bottom: 2px;
  }

  .modal-stat-label { font-size: 11px; color: var(--grey); letter-spacing: 1px; text-transform: uppercase; }

  .modal-actions { display: flex; gap: 10px; }
  .modal-actions .btn { flex: 1; justify-content: center; }

  /* ===== Toast ===== */
  .toast {
    position: fixed;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: var(--navy);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 10px;
    padding: 12px 24px;
    font-size: 14px;
    color: white;
    z-index: 2000;
    transition: transform 0.3s ease;
    box-shadow: 0 8px 24px rgba(26,45,90,0.3);
    white-space: nowrap;
  }

  .toast.show { transform: translateX(-50%) translateY(0); }

  /* Responsive */
  @media (max-width: 600px) {
    .header-badge { display: none; }
    .quiz-header { flex-direction: column; }
    .chapter-grid { grid-template-columns: 1fr; }
    .quiz-grid { grid-template-columns: repeat(2, 1fr); }
    .q-navigator { gap: 6px; }
    .q-dot { width: 30px; height: 30px; font-size: 11px; }
    .modal-actions { flex-direction: column; }
  }

  .hidden { display: none !important; }

  .tag-row {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-top: 6px;
  }

  .tag {
    font-size: 11px;
    padding: 3px 10px;
    border-radius: 20px;
    background: var(--bg2);
    color: var(--grey);
    border: 1px solid var(--border);
    letter-spacing: 0.5px;
  }

  .divider { height: 1px; background: var(--border); margin: 32px 0; }

  .pdf-btn-area {
    display: flex;
    gap: 12px;
    justify-content: center;
    flex-wrap: wrap;
  }
</style>
</head>
<body>

<header class="header">
  <div class="header-logo">
    <div class="ashok-chakra">⚙</div>
    <div>
      <div class="header-title">CSAT APTITUDE</div>
      <div class="header-sub">UPSC Prelims Paper-II</div>
    </div>
  </div>
  <div class="header-badge">Practice Portal</div>
</header>

<div id="app">
  <!-- Screens rendered here by JS -->
</div>

<div id="toast" class="toast"></div>
<div id="modal-overlay" class="modal-overlay hidden"></div>

<script>
// ============================================================
//  CONFIG
// ============================================================
const QUESTIONS_PER_QUIZ = 20;

const CHAPTERS = [
  { id: "codingdecoding",  name: "Coding Decoding",       icon: "🔢", file: "chapters/codingdecoding.json", tags: [] },
  { id: "numberseries",  name: "Number Series",       icon: "🔢", file: "chapters/numberseries.json", tags: [] },
  { id: "missingnumber",  name: "Missing Number",       icon: "📈", file: "chapters/missingnumber.json", tags: [] },
  { id: "numbersystem",  name: "Number System",       icon: "🔢", file: "chapters/numbersystem.json", tags: [] },
//   { id: "series",        name: "Number Series",        icon: "📈", file: "chapters/series.json",       tags: ["Patterns","Missing Term"] },
//   { id: "probability",   name: "Probability",          icon: "🎲", file: "chapters/probability.json",  tags: ["Basic","Combinatorics"] },
//   { id: "bloodrelation", name: "Blood Relations",      icon: "🧬", file: "chapters/bloodrelation.json",tags: ["Family Tree","Coded"] },
//   { id: "ratio",         name: "Ratio & Proportion",   icon: "⚖️", file: "chapters/ratio.json",        tags: ["Mixtures","Alligation"] },
//   { id: "percentage",    name: "Percentages",          icon: "💯", file: "chapters/percentage.json",   tags: ["Profit/Loss","Discount"] },
//   { id: "time",          name: "Time & Work",          icon: "⏱️", file: "chapters/time.json",         tags: ["Pipes","Work Rate"] },
//   { id: "speed",         name: "Speed, Time & Distance",icon: "🚆", file: "chapters/speed.json",       tags: ["Trains","Boats"] },
//   { id: "algebra",       name: "Basic Algebra",        icon: "🔣", file: "chapters/algebra.json",      tags: ["Linear Eq","Quadratic"] },
//   { id: "geometry",      name: "Geometry & Mensuration",icon: "📐", file: "chapters/geometry.json",   tags: ["Area","Volume","Angles"] },
//   { id: "data",          name: "Data Interpretation",  icon: "📊", file: "chapters/data.json",         tags: ["Tables","Charts"] },
//   { id: "logic",         name: "Logical Reasoning",    icon: "🧩", file: "chapters/logic.json",        tags: ["Coding","Sequences"] },
];

// ============================================================
//  STATE
// ============================================================
let state = {
  screen: 'home',           // home | chapter | quiz | result
  chapter: null,
  questions: [],
  quizIndex: 0,             // which quiz set (0-based)
  currentQ: 0,              // index within quiz set
  answers: {},              // { questionId: chosenOptionIndex }
  submitted: false,
  scores: {},               // { "chapterId:quizIndex": { correct, total, date } }
};

// Load saved scores
try {
  const saved = localStorage.getItem('csat_scores');
  if (saved) state.scores = JSON.parse(saved);
} catch(e) {}

function saveScores() {
  try { localStorage.setItem('csat_scores', JSON.stringify(state.scores)); } catch(e) {}
}

// ============================================================
//  ROUTER
// ============================================================
function render() {
  const app = document.getElementById('app');
  if (state.screen === 'home')    app.innerHTML = renderHome();
  if (state.screen === 'chapter') app.innerHTML = renderChapterScreen();
  if (state.screen === 'quiz')    app.innerHTML = renderQuizScreen();
  if (state.screen === 'result')  app.innerHTML = renderResultScreen();
  bindEvents();
}

// ============================================================
//  HOME SCREEN
// ============================================================
function renderHome() {
  const totalChapters = CHAPTERS.length;
  const totalQuizzes = CHAPTERS.reduce((s, c) => {
    // rough estimate — we don't know question count unless loaded
    return s + 5;
  }, 0);

  const cards = CHAPTERS.map(ch => {
    const tags = ch.tags.map(t => `<span class="tag">${t}</span>`).join('');
    return `
    <div class="chapter-card" data-chapter="${ch.id}">
      <div class="chapter-icon">${ch.icon}</div>
      <div class="chapter-info">
        <div class="chapter-name">${ch.name}</div>
        <div class="tag-row">${tags}</div>
      </div>
      <div class="chapter-arrow">›</div>
    </div>`;
  }).join('');

  return `
  <div class="home-hero">
    <h1>Master <span>UPSC CSAT</span><br/>Paper-II Aptitude</h1>
    <p>Chapter-wise MCQ practice with detailed explanations, quiz-based sets of ${QUESTIONS_PER_QUIZ} questions, and downloadable PDF reports.</p>
  </div>

  <div class="section-heading">Choose a Chapter</div>
  <div class="chapter-grid">${cards}</div>`;
}

// ============================================================
//  CHAPTER SCREEN (quiz list)
// ============================================================
function renderChapterScreen() {
  const ch = CHAPTERS.find(c => c.id === state.chapter.id);

  if (!state.questions || state.questions.length === 0) {
    return `
    <div class="breadcrumb"><a id="goHome">Home</a> › ${ch.name}</div>
    <div class="loading"><div class="spinner"></div> Loading questions…</div>`;
  }

  const total = state.questions.length;
  const numQuizzes = Math.ceil(total / QUESTIONS_PER_QUIZ);

  const cards = Array.from({ length: numQuizzes }, (_, i) => {
    const start = i * QUESTIONS_PER_QUIZ + 1;
    const end = Math.min((i + 1) * QUESTIONS_PER_QUIZ, total);
    const key = `${ch.id}:${i}`;
    const score = state.scores[key];
    const badge = score
      ? `<span class="quiz-status status-done">✓ ${score.correct}/${score.total}</span>`
      : `<span class="quiz-status status-new">New</span>`;
    return `
    <div class="quiz-card" data-quiz="${i}">
      ${badge}
      <div class="quiz-num">${i + 1}</div>
      <div class="quiz-label">Quiz ${i + 1}</div>
      <div class="quiz-range">Q${start} – Q${end}</div>
    </div>`;
  }).join('');

  return `
  <div class="breadcrumb"><a id="goHome">Home</a> › ${ch.name}</div>
  <div class="chapter-header">
    <div class="chapter-header-icon">${ch.icon}</div>
    <div>
      <h2>${ch.name}</h2>
      <p>${state.chapterMeta?.description || ''}</p>
      <div class="tag-row" style="margin-top:10px">
        <span class="tag">${total} Questions</span>
        <span class="tag">${numQuizzes} Quizzes</span>
        <span class="tag">${QUESTIONS_PER_QUIZ} per quiz</span>
      </div>
    </div>
  </div>
  <div class="section-heading">Select a Quiz Set</div>
  <div class="quiz-grid">${cards}</div>`;
}

// ============================================================
//  QUIZ SCREEN
// ============================================================
function getQuizQuestions() {
  const start = state.quizIndex * QUESTIONS_PER_QUIZ;
  return state.questions.slice(start, start + QUESTIONS_PER_QUIZ);
}

function renderQuizScreen() {
  const ch = CHAPTERS.find(c => c.id === state.chapter.id);
  const qs = getQuizQuestions();
  const q = qs[state.currentQ];
  const total = qs.length;
  const answered = Object.keys(state.answers).length;
  const pct = Math.round((state.currentQ + 1) / total * 100);

  // Navigator dots
  const dots = qs.map((qq, i) => {
    let cls = 'q-dot';
    if (i === state.currentQ) cls += ' active';
    else if (state.answers[qq.id] !== undefined) cls += ' answered';
    return `<div class="${cls}" data-qi="${i}">${i + 1}</div>`;
  }).join('');

  // Options
  const labels = ['A', 'B', 'C', 'D'];
  const chosenIdx = state.answers[q.id];

  const opts = q.options.map((opt, oi) => {
    let cls = 'option-btn';
    let icon = '';

    if (state.submitted) {
      cls += ' disabled';
      if (oi === q.answer) { cls += ' correct'; icon = ' ✓'; }
      else if (oi === chosenIdx && chosenIdx !== q.answer) { cls += ' wrong'; icon = ' ✗'; }
      else if (oi === chosenIdx) { cls += ' selected'; }
    } else {
      if (oi === chosenIdx) cls += ' selected';
    }

    return `
    <button class="${cls}" data-oi="${oi}" ${state.submitted ? 'disabled' : ''}>
      <span class="option-label">${labels[oi]}</span>
      <span>${opt}${icon}</span>
    </button>`;
  }).join('');

  const explanationShow = state.submitted ? 'show' : '';

  // Prev / Next
  const prevDisabled = state.currentQ === 0 ? 'disabled' : '';
  const nextLabel = state.currentQ < total - 1 ? 'Next ›' : (state.submitted ? 'View Results' : 'Next ›');

  return `
  <div class="breadcrumb">
    <a id="goHome">Home</a> › <a id="goChapter">${ch.name}</a> › Quiz ${state.quizIndex + 1}
  </div>

  <div class="quiz-header">
    <div class="quiz-title-block">
      <h2>${ch.name} — Quiz ${state.quizIndex + 1}</h2>
      <small>${ch.icon} Question ${state.currentQ + 1} of ${total} · ${answered} answered</small>
    </div>
    <div class="quiz-actions">
      <button class="btn btn-outline" id="btnClearAns">Clear</button>
      <button class="btn btn-danger" id="btnSubmit">${state.submitted ? '📥 Download PDF' : '⚑ Submit Quiz'}</button>
    </div>
  </div>

  <div class="progress-meta">
    <span>Progress: ${answered}/${total} answered</span>
    <span>${pct}%</span>
  </div>
  <div class="progress-bar-wrap">
    <div class="progress-bar-fill" style="width:${pct}%"></div>
  </div>

  <div class="q-navigator">${dots}</div>

  <div class="question-card">
    <div class="q-number">Question ${state.currentQ + 1}</div>
    <div class="q-text">${q.question}</div>
    <div class="options-list">${opts}</div>
    <div class="explanation-box ${explanationShow}">
      <strong>Explanation</strong>
      ${q.explanation || 'No explanation available.'}
    </div>
  </div>

  <div class="nav-row">
    <button class="btn btn-outline" id="btnPrev" ${prevDisabled}>‹ Previous</button>
    <button class="btn btn-primary" id="btnNext">${nextLabel}</button>
  </div>`;
}

// ============================================================
//  RESULT SCREEN
// ============================================================
function renderResultScreen() {
  const ch = CHAPTERS.find(c => c.id === state.chapter.id);
  const qs = getQuizQuestions();
  const total = qs.length;
  let correct = 0, wrong = 0, skipped = 0;

  qs.forEach(q => {
    const ans = state.answers[q.id];
    if (ans === undefined) skipped++;
    else if (ans === q.answer) correct++;
    else wrong++;
  });

  const pct = Math.round(correct / total * 100);
  const circumference = 2 * Math.PI * 60;
  const dashOffset = circumference - (pct / 100) * circumference;

  let grade = pct >= 80 ? '🏆 Excellent!' : pct >= 60 ? '👍 Good Job!' : pct >= 40 ? '📚 Keep Practising' : '💪 Needs More Work';

  return `
  <div class="result-screen">
    <div class="result-score-ring">
      <svg width="160" height="160" viewBox="0 0 160 160">
        <circle cx="80" cy="80" r="60" fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="12"/>
        <circle cx="80" cy="80" r="60" fill="none"
          stroke="url(#scoreGrad)" stroke-width="12"
          stroke-linecap="round"
          stroke-dasharray="${circumference}"
          stroke-dashoffset="${dashOffset}"
          style="transition: stroke-dashoffset 1s ease"/>
        <defs>
          <linearGradient id="scoreGrad" x1="0" y1="0" x2="1" y2="0">
            <stop offset="0%" stop-color="#FF6B00"/>
            <stop offset="100%" stop-color="#E8B84B"/>
          </linearGradient>
        </defs>
      </svg>
      <div class="score-text-center">
        <div class="score-big">${pct}%</div>
        <div class="score-denom">${correct}/${total}</div>
      </div>
    </div>

    <div class="result-title">${grade}</div>
    <div class="result-subtitle">${ch.name} · Quiz ${state.quizIndex + 1} · UPSC CSAT Practice</div>

    <div class="result-stats">
      <div class="result-stat"><div class="result-stat-num correct-color">${correct}</div><div class="result-stat-label">Correct</div></div>
      <div class="result-stat"><div class="result-stat-num wrong-color">${wrong}</div><div class="result-stat-label">Wrong</div></div>
      <div class="result-stat"><div class="result-stat-num skip-color">${skipped}</div><div class="result-stat-label">Skipped</div></div>
      <div class="result-stat"><div class="result-stat-num">${total}</div><div class="result-stat-label">Total</div></div>
    </div>

    <div class="pdf-btn-area">
      <button class="btn btn-primary" id="btnDownloadPDF">📥 Download PDF Report</button>
      <button class="btn btn-outline" id="btnRetakeQuiz">🔁 Retake Quiz</button>
      <button class="btn btn-outline" id="goChapter">← More Quizzes</button>
    </div>
  </div>`;
}

// ============================================================
//  EVENTS
// ============================================================
function bindEvents() {
  // Home chapter cards
  document.querySelectorAll('.chapter-card').forEach(el => {
    el.addEventListener('click', () => loadChapter(el.dataset.chapter));
  });

  // Home nav
  document.getElementById('goHome')?.addEventListener('click', goHome);
  document.getElementById('goChapter')?.addEventListener('click', () => goChapterScreen());

  // Chapter quiz cards
  document.querySelectorAll('.quiz-card').forEach(el => {
    el.addEventListener('click', () => startQuiz(parseInt(el.dataset.quiz)));
  });

  // Quiz screen
  document.querySelectorAll('.option-btn').forEach(el => {
    el.addEventListener('click', () => {
      if (state.submitted) return;
      const qs = getQuizQuestions();
      const q = qs[state.currentQ];
      state.answers[q.id] = parseInt(el.dataset.oi);
      render();
    });
  });

  document.querySelectorAll('.q-dot').forEach(el => {
    el.addEventListener('click', () => {
      state.currentQ = parseInt(el.dataset.qi);
      render();
    });
  });

  document.getElementById('btnPrev')?.addEventListener('click', () => {
    if (state.currentQ > 0) { state.currentQ--; render(); }
  });

  document.getElementById('btnNext')?.addEventListener('click', () => {
    const qs = getQuizQuestions();
    if (state.submitted && state.currentQ >= qs.length - 1) {
      state.screen = 'result'; render(); return;
    }
    if (state.currentQ < qs.length - 1) { state.currentQ++; render(); }
    else if (!state.submitted) { showSubmitModal(); }
  });

  document.getElementById('btnSubmit')?.addEventListener('click', () => {
    if (state.submitted) { downloadPDF(); return; }
    showSubmitModal();
  });

  document.getElementById('btnClearAns')?.addEventListener('click', () => {
    if (state.submitted) return;
    const qs = getQuizQuestions();
    const q = qs[state.currentQ];
    delete state.answers[q.id];
    render();
  });

  document.getElementById('btnDownloadPDF')?.addEventListener('click', downloadPDF);
  document.getElementById('btnRetakeQuiz')?.addEventListener('click', () => {
    state.answers = {};
    state.submitted = false;
    state.currentQ = 0;
    state.screen = 'quiz';
    render();
  });
}

// ============================================================
//  NAVIGATION
// ============================================================
function goHome() {
  state = {
    screen: 'home', chapter: null, questions: [], quizIndex: 0,
    currentQ: 0, answers: {}, submitted: false,
    scores: state.scores, chapterMeta: null
  };
  render();
}

function goChapterScreen() {
  state.screen = 'chapter';
  state.answers = {};
  state.submitted = false;
  state.currentQ = 0;
  render();
}

async function loadChapter(chapterId) {
  const ch = CHAPTERS.find(c => c.id === chapterId);
  state.chapter = ch;
  state.questions = [];
  state.screen = 'chapter';
  state.answers = {};
  state.submitted = false;
  state.currentQ = 0;
  render();

  try {
    const res = await fetch(ch.file);
    if (!res.ok) throw new Error('File not found');
    const data = await res.json();
    state.questions = data.questions || [];
    state.chapterMeta = data;
    render();
  } catch(e) {
    showToast('⚠ Could not load chapter file. Place JSON in chapters/ folder.');
    console.error(e);
  }
}

function startQuiz(quizIndex) {
  state.quizIndex = quizIndex;
  state.currentQ = 0;
  state.answers = {};
  state.submitted = false;
  state.screen = 'quiz';
  render();
}

function showSubmitModal() {
  const qs = getQuizQuestions();
  const answered = Object.keys(state.answers).length;
  const skipped = qs.length - answered;

  const overlay = document.getElementById('modal-overlay');
  overlay.classList.remove('hidden');
  overlay.innerHTML = `
  <div class="modal">
    <h3>⚑ Submit Quiz?</h3>
    <p>You are about to submit Quiz ${state.quizIndex + 1}. This action cannot be undone. You can download a PDF report afterward.</p>
    <div class="modal-stats">
      <div class="modal-stat">
        <div class="modal-stat-num" style="color:var(--gold-light)">${qs.length}</div>
        <div class="modal-stat-label">Total</div>
      </div>
      <div class="modal-stat">
        <div class="modal-stat-num" style="color:var(--green-light)">${answered}</div>
        <div class="modal-stat-label">Answered</div>
      </div>
      <div class="modal-stat">
        <div class="modal-stat-num" style="color:#FFB74D">${skipped}</div>
        <div class="modal-stat-label">Skipped</div>
      </div>
    </div>
    <div class="modal-actions">
      <button class="btn btn-outline" id="modalCancel">Cancel</button>
      <button class="btn btn-primary" id="modalConfirm">Yes, Submit</button>
    </div>
  </div>`;

  document.getElementById('modalCancel').addEventListener('click', closeModal);
  document.getElementById('modalConfirm').addEventListener('click', () => {
    closeModal();
    submitQuiz();
  });
}

function closeModal() {
  document.getElementById('modal-overlay').classList.add('hidden');
  document.getElementById('modal-overlay').innerHTML = '';
}

function submitQuiz() {
  state.submitted = true;
  const qs = getQuizQuestions();
  const ch = CHAPTERS.find(c => c.id === state.chapter.id);
  let correct = 0;
  qs.forEach(q => { if (state.answers[q.id] === q.answer) correct++; });

  const key = `${ch.id}:${state.quizIndex}`;
  state.scores[key] = { correct, total: qs.length, date: new Date().toLocaleDateString() };
  saveScores();

  state.screen = 'result';
  render();
  showToast(`Quiz submitted! Score: ${correct}/${qs.length}`);
}

// ============================================================
//  PDF DOWNLOAD
// ============================================================
function downloadPDF() {
  const { jsPDF } = window.jspdf;
  if (!jsPDF) { showToast('PDF library not loaded'); return; }

  const ch = CHAPTERS.find(c => c.id === state.chapter.id);
  const qs = getQuizQuestions();
  const doc = new jsPDF({ unit: 'mm', format: 'a4' });
  const labels = ['A', 'B', 'C', 'D'];
  const pageW = 210, pageH = 297;
  const margin = 16;
  let y = 20;

  function checkPage(needed = 20) {
    if (y + needed > pageH - 16) { doc.addPage(); y = 20; }
  }

  // Header
  doc.setFillColor(15, 27, 60);
  doc.rect(0, 0, pageW, 18, 'F');
  doc.setTextColor(200, 151, 58);
  doc.setFontSize(13);
  doc.setFont('helvetica', 'bold');
  doc.text('CSAT APTITUDE – UPSC PRELIMS PAPER II', pageW / 2, 11, { align: 'center' });
  doc.setFontSize(8);
  doc.setTextColor(138, 155, 181);
  doc.text(`${ch.name} · Quiz ${state.quizIndex + 1} · Generated: ${new Date().toLocaleDateString()}`, pageW / 2, 16, { align: 'center' });
  y = 26;

  // Score summary
  let correct = 0, wrong = 0, skipped = 0;
  qs.forEach(q => {
    const a = state.answers[q.id];
    if (a === undefined) skipped++;
    else if (a === q.answer) correct++;
    else wrong++;
  });

  doc.setFillColor(17, 34, 72);
  doc.roundedRect(margin, y, pageW - margin * 2, 22, 3, 3, 'F');
  doc.setTextColor(232, 184, 75);
  doc.setFontSize(16);
  doc.setFont('helvetica', 'bold');
  doc.text(`${Math.round(correct / qs.length * 100)}%`, margin + 12, y + 13);
  doc.setFontSize(9);
  doc.setTextColor(200, 200, 200);
  doc.text(`Score: ${correct}/${qs.length}`, margin + 32, y + 8);
  doc.setTextColor(76, 175, 80);
  doc.text(`✓ Correct: ${correct}`, margin + 32, y + 14);
  doc.setTextColor(239, 83, 80);
  doc.text(`✗ Wrong: ${wrong}`, margin + 80, y + 14);
  doc.setTextColor(255, 183, 77);
  doc.text(`– Skipped: ${skipped}`, margin + 120, y + 14);
  y += 30;

  // Questions
  qs.forEach((q, qi) => {
    const userAns = state.answers[q.id];
    const isCorrect = userAns === q.answer;
    const isSkipped = userAns === undefined;

    checkPage(40);

    // Q number + status chip
    doc.setFont('helvetica', 'bold');
    doc.setFontSize(10);
    let statusColor = [138, 155, 181];
    let statusText = 'SKIPPED';
    if (!isSkipped) {
      if (isCorrect) { statusColor = [76, 175, 80]; statusText = 'CORRECT'; }
      else { statusColor = [229, 57, 53]; statusText = 'WRONG'; }
    }
    doc.setTextColor(...statusColor);
    doc.text(`Q${qi + 1}.`, margin, y);
    doc.setFillColor(...statusColor);
    doc.roundedRect(pageW - margin - 22, y - 5, 22, 7, 2, 2, 'F');
    doc.setTextColor(255, 255, 255);
    doc.setFontSize(7);
    doc.text(statusText, pageW - margin - 11, y - 0.5, { align: 'center' });

    // Question text
    doc.setTextColor(30, 30, 30);
    doc.setFontSize(10);
    doc.setFont('helvetica', 'bold');
    const qLines = doc.splitTextToSize(q.question, pageW - margin * 2 - 10);
    doc.text(qLines, margin + 10, y);
    y += qLines.length * 5.5 + 3;

    // Options
    doc.setFont('helvetica', 'normal');
    doc.setFontSize(9.5);
    q.options.forEach((opt, oi) => {
      checkPage(10);
      let color = [60, 60, 60];
      if (oi === q.answer) color = [46, 125, 58];
      if (oi === userAns && !isCorrect) color = [198, 40, 40];
      doc.setTextColor(...color);

      let prefix = `   ${labels[oi]}. `;
      if (oi === q.answer) prefix = `✓  ${labels[oi]}. `;
      else if (oi === userAns && !isCorrect) prefix = `✗  ${labels[oi]}. `;

      const optLines = doc.splitTextToSize(prefix + opt, pageW - margin * 2 - 8);
      doc.text(optLines, margin + 6, y);
      y += optLines.length * 5 + 1;
    });

    // Your answer vs correct
    if (!isSkipped) {
      checkPage(10);
      doc.setFontSize(8.5);
      if (!isCorrect) {
        doc.setTextColor(198, 40, 40);
        doc.text(`   Your answer: ${labels[userAns]}`, margin + 6, y); y += 5;
        doc.setTextColor(46, 125, 58);
        doc.text(`   Correct answer: ${labels[q.answer]}`, margin + 6, y); y += 5;
      }
    }

    // Explanation
    if (q.explanation) {
      checkPage(15);
      doc.setFillColor(250, 243, 230);
      const expLines = doc.splitTextToSize(q.explanation, pageW - margin * 2 - 16);
      doc.roundedRect(margin + 4, y - 1, pageW - margin * 2 - 4, expLines.length * 5 + 8, 2, 2, 'F');
      doc.setTextColor(130, 80, 20);
      doc.setFontSize(8);
      doc.setFont('helvetica', 'bold');
      doc.text('Explanation:', margin + 8, y + 4);
      doc.setFont('helvetica', 'normal');
      doc.text(expLines, margin + 8, y + 9);
      y += expLines.length * 5 + 12;
    }

    y += 6;
    // Divider
    if (qi < qs.length - 1) {
      checkPage(4);
      doc.setDrawColor(220, 220, 220);
      doc.line(margin, y, pageW - margin, y);
      y += 6;
    }
  });

  // Footer on each page
  const totalPages = doc.getNumberOfPages();
  for (let i = 1; i <= totalPages; i++) {
    doc.setPage(i);
    doc.setFillColor(240, 240, 245);
    doc.rect(0, pageH - 10, pageW, 10, 'F');
    doc.setTextColor(140, 140, 160);
    doc.setFontSize(7);
    doc.setFont('helvetica', 'normal');
    doc.text('CSAT Aptitude Practice · UPSC Prelims Paper-II', margin, pageH - 4);
    doc.text(`Page ${i} of ${totalPages}`, pageW - margin, pageH - 4, { align: 'right' });
  }

  const fname = `CSAT_${ch.name.replace(/\s/g,'_')}_Quiz${state.quizIndex + 1}.pdf`;
  doc.save(fname);
  showToast('📥 PDF downloaded!');
}


function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2800);
}


render();
</script>
</body>
